services:
  backend:
    build:
      context: .
      target: production
    ports:
      - "8000:8000"
    environment:
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - SEASID_AUTH_ENABLED=${SEASID_AUTH_ENABLED:-true}
      - SEASID_AUTH_SECRET=${SEASID_AUTH_SECRET}
      - SEASID_ACCESS_TOKEN_MINUTES=${SEASID_ACCESS_TOKEN_MINUTES:-60}
      - SEASID_ADMIN_USERNAME=${SEASID_ADMIN_USERNAME:-admin}
      - SEASID_ADMIN_PASSWORD=${SEASID_ADMIN_PASSWORD}
      - SEASID_AUTH_USERS_JSON=${SEASID_AUTH_USERS_JSON:-}
    volumes:
      - seasid-data:/app/backend/data
    restart: unless-stopped

volumes:
  seasid-data:
